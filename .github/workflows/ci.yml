name: CI

on:
  push:
    branches: [main, mobile-expo]
    tags: ['v*']
  pull_request:
    branches: [main, mobile-expo]

jobs:
  web-build-and-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test --silent
        continue-on-error: true

      - name: Build production bundle
        run: npm build

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel
          vercel --prod --confirm --token $VERCEL_TOKEN

  mobile-build:
    if: github.ref == 'refs/heads/mobile-expo'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-expo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify Expo config
        run: npx expo diagnostics
  mobile-build-prod:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-expo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Expo env vars
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          echo VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY >> .env
          echo VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN >> .env
          echo VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID >> .env
          echo VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET >> .env
          echo VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID >> .env
          echo VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID >> .env

      - name: Install Expo CLI
        run: npm i -g expo-cli

      - name: Build production binaries (EAS)
        run: npm run build:eas

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-build
          path: ./mobile-expo/dist/**
