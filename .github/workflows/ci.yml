name: CI

on:
  push:
    branches: [main, mobile-expo]
  pull_request:
    branches: [main, mobile-expo]

jobs:
  web-build-and-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test --silent
        continue-on-error: true

      - name: Build production bundle
        run: npm build

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel
          vercel --prod --confirm --token $VERCEL_TOKEN

  mobile-build:
    if: github.ref == 'refs/heads/mobile-expo'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-expo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo config
        run: npx expo diagnostics
